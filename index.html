<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏐 Vôlei Domingo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #1B5E20; --verde2: #2E7D32; --verde3: #388E3C;
  --verde-c: #C8E6C9; --verde-n: #76FF03;
  --laranja: #E65100; --laranja2: #FF6D00; --laranja-c: #FFF3E0;
  --amarelo: #F9A825; --amarelo-c: #FFF9C4;
  --vermelho: #C62828; --vermelho-c: #FFEBEE;
  --azul: #1565C0; --azul2: #1976D2; --azul-c: #E3F2FD;
  --cinza: #455A64; --cinza-c: #ECEFF1;
  --bg: #0a1a0b; --card: #0f1f10; --card2: #162618; --border: #243826;
  --text: #e8f5e9; --muted: #5a8a5c; --accent: #76FF03;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* MODAL DE LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-logo{font-family:'Bebas Neue',cursive;font-size:3.5rem;color:var(--verde-n);letter-spacing:4px;margin-bottom:4px;}
.login-sub{color:var(--muted);font-size:0.85rem;margin-bottom:32px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:340px;}
.login-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px;}
.login-btns{display:flex;flex-direction:column;gap:10px;}
.login-btn{padding:14px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.lb-admin{background:var(--verde);color:#fff;}
.lb-admin:hover{background:var(--verde3);}
.lb-member{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.lb-member:hover{border-color:var(--verde3);}
.login-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;margin-bottom:10px;}
.login-input:focus{border-color:var(--verde3);}
.login-input::placeholder{color:var(--muted);}

/* HEADER */
.header{background:var(--verde);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--verde3);}
.header-left h1{font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:2px;color:#fff;line-height:1;}
.header-left .sub{font-size:0.68rem;color:#A5D6A7;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.role-badge{font-size:0.68rem;background:rgba(0,0,0,0.3);color:#A5D6A7;padding:3px 8px;border-radius:10px;}
.logout-btn{background:none;border:none;color:#A5D6A7;font-size:1.1rem;cursor:pointer;padding:4px;}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:58px;z-index:99;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:11px 14px;font-size:0.72rem;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* CONTENT */
.content{padding:14px;max-width:520px;margin:0 auto;padding-bottom:20px;}
.panel{display:none;animation:fadeIn 0.2s ease;}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.card-title{font-family:'Bebas Neue',cursive;font-size:0.95rem;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* MÉTRICAS */
.metrics{display:grid;gap:8px;margin-bottom:12px;}
.metrics-2{grid-template-columns:1fr 1fr;}
.metrics-3{grid-template-columns:repeat(3,1fr);}
.metrics-4{grid-template-columns:repeat(4,1fr);}
.metric{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.metric .num{font-family:'Bebas Neue',cursive;font-size:1.7rem;line-height:1;}
.metric .lbl{font-size:0.62rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.4px;}

/* BOTÕES */
.btn{padding:12px 16px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-block{width:100%;margin-bottom:8px;}
.btn-verde{background:var(--verde);color:#fff;}
.btn-verde:hover{background:var(--verde3);}
.btn-laranja{background:var(--laranja);color:#fff;}
.btn-amarelo{background:var(--amarelo);color:#000;}
.btn-vermelho{background:var(--vermelho);color:#fff;}
.btn-ghost{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--verde3);color:var(--text);}
.btn-sm{padding:7px 12px;font-size:0.78rem;border-radius:8px;}
.btn-xs{padding:5px 9px;font-size:0.7rem;border-radius:6px;}
.btn-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}

/* INPUTS */
.input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;margin-bottom:10px;}
.input:focus{border-color:var(--verde3);}
.input::placeholder{color:var(--muted);}
select.input option{background:var(--card2);color:var(--text);}
.input-row{display:flex;gap:8px;}
.input-row .input{margin-bottom:0;}

/* LABELS */
.label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;display:block;}

/* JOGADOR ITEM */
.jogador-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;transition:all 0.2s;}
.jogador-item:hover{border-color:var(--verde3);}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.82rem;flex-shrink:0;}
.jogador-info{flex:1;min-width:0;}
.jogador-nome{font-size:0.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jogador-meta{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.jogador-acoes{display:flex;gap:5px;flex-shrink:0;}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.68rem;font-weight:600;}
.b-fixo{background:#1B5E2030;color:#81C784;border:1px solid #1B5E2060;}
.b-avulso{background:#E6510030;color:#FFB74D;border:1px solid #E6510060;}
.b-apoio{background:#1565C030;color:#64B5F6;border:1px solid #1565C060;}
.b-sim{background:#1B5E2040;color:#A5D6A7;}
.b-nao{background:#C6282840;color:#EF9A9A;}
.b-pago{background:#1B5E2040;color:#A5D6A7;}
.b-pend{background:#C6282840;color:#EF9A9A;}

/* DIVIDER */
.divider{font-family:'Bebas Neue',cursive;font-size:0.72rem;letter-spacing:2px;color:var(--muted);margin:12px 0 10px;display:flex;align-items:center;gap:8px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* TIMES */
.time-card{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px;}
.time-header{padding:10px 14px;font-family:'Bebas Neue',cursive;font-size:1rem;letter-spacing:2px;display:flex;align-items:center;justify-content:space-between;}
.time-body{background:var(--card);padding:10px;}
.time-player{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;font-size:0.83rem;margin-bottom:4px;}
.time-player:last-child{margin-bottom:0;}
.nlvl{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nlvl-A{background:#4CAF50;}
.nlvl-B{background:#FF7043;}
.nlvl-C{background:#78909C;}

/* FILA */
.fila-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:0.83rem;}
.fila-pos{font-family:'Bebas Neue',cursive;font-size:1rem;color:var(--muted);min-width:18px;}

/* RESULT BTNS */
.result-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;}
.result-btns{display:flex;gap:8px;}
.result-btn{flex:1;padding:14px 8px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;}
.result-btn:hover{border-color:var(--accent);color:var(--accent);}

/* HIST */
.hist-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:0.82rem;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#1B5E20;padding:10px 20px;border-radius:20px;font-weight:600;font-size:0.85rem;opacity:0;transition:all 0.3s;z-index:9999;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;border:1px solid var(--border);padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-family:'Bebas Neue',cursive;font-size:1.2rem;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}

/* SCROLL */
.scroll-list{max-height:50vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* CHECK */
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;cursor:pointer;transition:all 0.2s;user-select:none;}
.check-item.checked{border-color:var(--verde3);background:#1a3a1b;}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all 0.2s;}
.check-item.checked .check-circle{background:var(--verde3);border-color:var(--verde3);}

/* MEMBER VIEW */
.confirm-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;text-align:center;}
.confirm-card .big-num{font-family:'Bebas Neue',cursive;font-size:2.5rem;color:var(--accent);}
.confirm-btns{display:flex;gap:10px;}
.conf-btn{flex:1;padding:16px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.conf-btn-sim{background:#1B5E20;color:#fff;}
.conf-btn-nao{background:#C62828;color:#fff;}
.conf-btn-sim.ativo{background:var(--accent);color:#1B5E20;transform:scale(1.02);}
.conf-btn-nao.ativo{background:#EF5350;transform:scale(1.02);}

/* STATUS COLORS */
.t-A{background:#1B5E20;}
.t-B{background:#0D47A1;}
.t-C{background:#BF360C;}
.t-D{background:#4A148C;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem;}
.search-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 34px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;}
.search-input:focus{border-color:var(--verde3);}
.search-input::placeholder{color:var(--muted);}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:0.85rem;}
.toggle-sub{font-size:0.72rem;color:var(--muted);}

/* FINANCEIRO */
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:0.85rem;}
.fin-row:last-child{border-bottom:none;}
.fin-val{font-weight:600;}
.fin-verde{color:#A5D6A7;}
.fin-vermelho{color:#EF9A9A;}
.fin-amarelo{color:#FFD54F;}

/* EMPTY */
.empty{text-align:center;padding:28px 16px;color:var(--muted);}
.empty .big{font-size:2.2rem;margin-bottom:8px;}

/* PROGRESS */
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.5s ease;}

/* NIVEL BTNS */
.nivel-row{display:flex;gap:4px;}
.n-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:0.7rem;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.15s;flex-shrink:0;}
.n-A.on{background:#1B5E20;border-color:#388E3C;color:#fff;}
.n-B.on{background:#E65100;border-color:#FF6D00;color:#fff;}

// ============================================================
// UTILS
// ============================================================
function iniciais(nome) {
  return nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
}

function corAvatar(nivel) {
  return nivel==='A'?'#1B5E20':nivel==='B'?'#BF360C':'#37474F';
}

function valorFamilia(familia) {
  if(familia===0) return 0;
  if(familia===1) return 30;
  if(familia===2) return 45;
  if(familia===3) return 60;
  return 75;
}

function labelFamilia(familia) {
  if(familia===0) return 'Incluído';
  if(familia===1) return '1 pessoa · R$30';
  if(familia===2) return 'Casal · R$45';
  if(familia===3) return 'Família 3 · R$60';
  return 'Família 4+ · R$75';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2300);
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', e => {
  if(e.target === document.getElementById('modal')) closeModal();
});

// AUTH
// ============================================================
function loginAdmin() {
  const nome = document.getElementById('admin-nome').value;
  const senha = document.getElementById('admin-senha').value;
  const admin = ADMINS.find(a => a.nome === nome && a.senha === senha);
  if(!admin) { showToast('❌ Senha incorreta!'); return; }
  role = 'admin';
  adminName = nome;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('role-badge').textContent = nome.toUpperCase();
  renderApp();
}

function loginMember() {
  const n = document.getElementById('member-nome').value.trim();
  if(!n) { showToast('Digite seu nome!'); return; }
  const found = state.jogadores.find(j=>j.nome.toLowerCase()===n.toLowerCase()&&j.ativo);
  if(!found) { showToast('Nome não encontrado!'); return; }
  role = 'member';
  memberName = found.nome;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('role-badge').textContent = found.nome.split(' ')[0].toUpperCase();
  document.getElementById('header-sub').textContent = `Olá, ${found.nome.split(' ')[0]}! · Domingo 17h`;
  renderApp();
}

function logout() {
  role = null; memberName = null; adminName = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('admin-senha').value = '';
  document.getElementById('member-nome').value = '';
}

function renderApp() {
  const tabs = document.getElementById('main-tabs');
  if(role === 'admin') {
    tabs.innerHTML = `
      <button class="tab active" onclick="showTab('dashboard',this)">📊 Dashboard</button>
      <button class="tab" onclick="showTab('jogadores',this)">👥 Jogadores</button>

function showTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  renderPanel(tab);
}

function renderPanel(tab) {
  const c = document.getElementById('main-content');
  const fns = {
    'dashboard': renderDashboard,
    'jogadores': renderJogadores,
    'presenca': renderPresenca,
    'financeiro': renderFinanceiro,
    'churrasco': renderChurrasco,
    'times': renderTimes,
    'rodizio': renderRodizio,
    'calendario': renderCalendario,
    'config': renderConfig,
    'membro-home': renderMembroHome,
    'membro-presenca': renderMembroPresenca,
    'membro-churrasco': renderMembroChurrasco,
    'membro-times': renderMembroTimes,
  };
  c.innerHTML = `<div class="panel active" id="panel-${tab}"></div>`;
  if(fns[tab]) fns[tab](document.getElementById(`panel-${tab}`));
}

      <div class="card-title">💰 CAIXA</div>
      <div class="fin-row"><span>Arrecadado</span><span class="fin-val fin-verde">R$ ${arrecadado.toLocaleString('pt-BR')}</span></div>
      <div class="fin-row"><span>Gastos</span><span class="fin-val fin-vermelho">R$ ${gastos.toLocaleString('pt-BR')}</span></div>
      <div class="fin-row"><span style="font-weight:600">Saldo</span><span class="fin-val" style="color:${saldo>=0?'#A5D6A7':'#EF9A9A'};font-size:1.1rem">R$ ${saldo.toLocaleString('pt-BR')}</span></div>

    ${rodada ? `

      <div class="card-title">📅 DOMINGO ${rodada.data}</div>
      <div style="font-size:0.85rem;color:var(--muted)">
        ${confirmados} confirmados · ${state.historico.length} sets jogados

      <div style="font-size:0.7rem;color:var(--muted);margin-top:4px">${confirmados}/24 vagas</div>

        <div style="font-size:1.5rem;margin-bottom:8px">📅</div>
        <div style="font-size:0.85rem;color:var(--muted);margin-bottom:12px">Nenhuma rodada aberta</div>
        <button class="btn btn-verde btn-sm" onclick="abrirRodada()">+ Abrir Domingo</button>

      <div class="card-title">🔥 CHURRASCO</div>

function filtrarJogadores(q) {
  const f = q.toLowerCase();
  const jogs = state.jogadores.filter(j=>j.ativo&&j.nome.toLowerCase().includes(f));
  renderListaJogadores(jogs);
}

function renderListaJogadores(jogs) {
  const el = document.getElementById('lista-jogs');
  if(!jogs.length){el.innerHTML='<div class="empty"><div class="big">👥</div>Nenhum jogador</div>';return;}
  const sorted = [...jogs].sort((a,b)=>a.nome.localeCompare(b.nome));
  el.innerHTML = sorted.map(j=>`
    <div class="jogador-item">
      <div class="avatar" style="background:${corAvatar(j.nivel)}">${iniciais(j.nome)}</div>
      <div class="jogador-info">
        <div class="jogador-nome">${j.nome}</div>
        <div class="jogador-meta">
          <span class="badge ${j.tipo==='Fixo'?'b-fixo':j.tipo==='Avulso'?'b-avulso':'b-apoio'}">${j.tipo}</span>
          &nbsp;${j.familia>0?labelFamilia(j.familia):'Incluído'}
          ${j.obs?`<br><span style="color:var(--muted);font-size:0.65rem">${j.obs}</span>`:''}
        </div>
      </div>
      <div class="jogador-acoes">
        <button class="btn btn-ghost btn-xs" onclick="modalEditarJogador(${j.id})">✏️</button>
        <button class="btn btn-vermelho btn-xs" onclick="excluirJogador(${j.id})">✕</button>

    tipo: document.getElementById('mj-tipo').value,
    familia: parseInt(document.getElementById('mj-familia').value),

    obs: document.getElementById('mj-obs').value.trim(),

  `;
  renderListaPresenca(jogs);

function filtrarPresenca(q) {
  const f = q.toLowerCase();
  const jogs = state.jogadores.filter(j=>j.ativo&&j.tipo!=='Apoiador'&&j.nome.toLowerCase().includes(f));
  renderListaPresenca(jogs);
}

function renderListaPresenca(jogs) {
  const el = document.getElementById('lista-presenca');
  if(!el) return;
  const conf = state.rodadaAtual?.confirmacoes || {};
  const sorted = [...jogs].sort((a,b)=>{
    const oa = conf[a.id]==='sim'?0:conf[a.id]==='nao'?2:1;
    const ob = conf[b.id]==='sim'?0:conf[b.id]==='nao'?2:1;
    return oa-ob||a.nome.localeCompare(b.nome);
  });
  el.innerHTML = sorted.map(j=>{
    const v = conf[j.id];
    return `
      <div class="jogador-item" style="${v==='sim'?'border-color:#388E3C;background:#1a3a1b':v==='nao'?'border-color:#C6282860;opacity:0.6':''}">
        <div class="avatar" style="background:${corAvatar(j.nivel)}">${iniciais(j.nome)}</div>
        <div class="jogador-info">
          <div class="jogador-nome">${j.nome}</div>
          <div class="jogador-meta"><span class="badge ${j.tipo==='Fixo'?'b-fixo':'b-avulso'}">${j.tipo}</span></div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn btn-xs ${v==='sim'?'btn-verde':'btn-ghost'}" onclick="marcarPresenca(${j.id},'sim')">✓ Sim</button>
          <button class="btn btn-xs ${v==='nao'?'btn-vermelho':'btn-ghost'}" onclick="marcarPresenca(${j.id},'nao')">✗ Não</button>
        </div>
      </div>
    `;
  }).join('');
}

function marcarPresenca(id, val) {
  if(!state.rodadaAtual) return;
  state.rodadaAtual.confirmacoes[id] = val;
  saveState();
  const jogs = state.jogadores.filter(j=>j.ativo&&j.tipo!=='Apoiador');
  renderListaPresenca(jogs);
  const conf = state.rodadaAtual.confirmacoes;
  const confirmados = Object.values(conf).filter(v=>v==='sim').length;
  document.querySelector('.metric .num').textContent = confirmados;
}

function fecharRodada() {
  if(!confirm('Fechar a rodada atual?')) return;
  if(state.rodadaAtual) {
    state.rodadas.push({...state.rodadaAtual});
  }
  state.rodadaAtual = null;
  state.times = [];
  state.fila = [];
  state.historico = [];
  state.vitorias = {};
  saveState();
  showToast('✅ Rodada fechada!');
  renderPanel('presenca');
}

  const data = document.getElementById('lc-data').value;
  const dataFmt = data ? new Date(data+'T12:00').toLocaleDateString('pt-BR') : new Date().toLocaleDateString('pt-BR');
  state.caixa.push({
    id: Date.now(),
    desc,
    tipo: document.getElementById('lc-tipo').value,

    data: dataFmt,

function renderTimes(el) {
  const rod = state.rodadaAtual;
  const confirmados = rod ? state.jogadores.filter(j=>rod.confirmacoes[j.id]==='sim') : [];

  el.innerHTML = `
    <div class="card">
      <div class="card-title">⚙️ CONFIGURAR TIMES</div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:12px">
        ${confirmados.length} confirmados · ${Math.floor(confirmados.length/6)} times possíveis
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm ${state.numTimes===2?'btn-verde':''}" onclick="setNumTimes(2)">2 Times</button>
        <button class="btn btn-ghost btn-sm ${state.numTimes===3?'btn-verde':''}" onclick="setNumTimes(3)">3 Times</button>
        <button class="btn btn-ghost btn-sm ${state.numTimes===4?'btn-verde':''}" onclick="setNumTimes(4)">4 Times</button>
      </div>
      ${confirmados.length < 6 ? `
        <div style="background:#C6282820;border:1px solid #C6282840;border-radius:8px;padding:10px;font-size:0.82rem;color:#EF9A9A">
          ⚠️ Precisa de pelo menos 6 confirmados! (${confirmados.length} atualmente)
        </div>
      ` : `
        <button class="btn btn-verde btn-block" onclick="sortearTimes()">🎲 Sortear Times Equilibrados</button>
      `}
    </div>
    <div id="times-resultado"></div>
  `;
  if(state.times.length) renderTimesResultado();
}

function setNumTimes(n) {
  state.numTimes = n;
  saveState();
  renderPanel('times');
}

function sortearTimes() {
  const rod = state.rodadaAtual;
  if(!rod) { showToast('Abra uma rodada!'); return; }
  const confirmados = state.jogadores.filter(j=>rod.confirmacoes[j.id]==='sim');
  if(confirmados.length < 6) { showToast('Precisa de pelo menos 6!'); return; }

  const grupos = {A:[],B:[],C:[]};
  confirmados.forEach(j=>grupos[j.nivel].push({...j}));
  Object.keys(grupos).forEach(k=>grupos[k].sort(()=>Math.random()-0.5));

  const nomes = ['Time A','Time B','Time C','Time D'];
  const cores = ['t-A','t-B','t-C','t-D'];

  state.times = Array.from({length:state.numTimes},(_,i)=>({
    id:i, nome:nomes[i], cor:cores[i], jogadores:[], vitorias:0
  }));

  const todos = [...grupos.A,...grupos.B,...grupos.C];
  const maxJ = state.numTimes * 6;
  let ordem = [];
  for(let r=0;r<6;r++){
    if(r%2===0) for(let t=0;t<state.numTimes;t++) ordem.push(t);
    else for(let t=state.numTimes-1;t>=0;t--) ordem.push(t);
  }

  todos.slice(0,maxJ).forEach((j,i)=>{
    if(i<ordem.length) state.times[ordem[i]].jogadores.push(j);
  });

  state.fila = todos.slice(maxJ);
  state.vitorias = {};
  state.times.forEach(t=>state.vitorias[t.id]=0);
  saveState();
  renderTimesResultado();
  showToast('🎲 Times sorteados!');
}

function renderTimesResultado() {
  const el = document.getElementById('times-resultado');
  if(!el||!state.times.length) return;
  el.innerHTML = `
    <div class="divider">TIMES</div>
    ${state.times.map(t=>`
      <div class="time-card">
        <div class="time-header ${t.cor}" style="color:#fff">
          🏐 ${t.nome}
          <span style="font-family:'DM Sans';font-size:0.75rem;background:rgba(0,0,0,0.3);padding:3px 8px;border-radius:10px">⭐ ${state.vitorias[t.id]||0}x</span>
        </div>
        <div class="time-body">
          ${t.jogadores.map(j=>`
            <div class="time-player">
              <div class="nlvl nlvl-${j.nivel}"></div>
              <span>${j.nome}</span>
              <span style="margin-left:auto;font-size:0.7rem;color:var(--muted)">${j.nivel}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
    ${state.fila.length?`
      <div class="divider">FILA DE ESPERA</div>
      ${state.fila.map((j,i)=>`
        <div class="fila-item">
          <div class="fila-pos">${i+1}</div>
          <div class="nlvl nlvl-${j.nivel}"></div>
          <span>${j.nome}</span>
        </div>
      `).join('')}
    `:''}
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="sortearTimes()">🔀 Ressortear</button>
  `;
}

function registrarVitoria(timeIdx) {
  if(!state.times.length) return;
  const vencedor = state.times[timeIdx];
  const perdedorIdx = timeIdx===0?1:0;
  const perdedor = state.times[perdedorIdx];

  state.vitorias[vencedor.id] = (state.vitorias[vencedor.id]||0)+1;

  state.historico.push({
    set: state.historico.length+1,
    vencedor: vencedor.nome,
    perdedor: perdedor.nome,
    hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
  });

  const jogPerdedor = [...perdedor.jogadores];
  const jogVencedor = [...vencedor.jogadores];
  const venceuDuas = state.vitorias[vencedor.id]>=2;

  // Perdedor sai
  state.times.splice(perdedorIdx,1);
  if(state.times.length>1&&state.fila.length>=6){
    const novo = {id:Date.now(),nome:['Time A','Time B','Time C','Time D'][Math.floor(Math.random()*4)],cor:['t-A','t-B','t-C','t-D'][Math.floor(Math.random()*4)],jogadores:state.fila.splice(0,6),vitorias:0};
    state.times.splice(1,0,novo);
    state.vitorias[novo.id]=0;
  }
  state.fila.push(...jogPerdedor);

  // Vencedor ganhou 2x?
  if(venceuDuas){
    showToast(`🏆 ${vencedor.nome} ganhou 2x — saindo!`);
    state.vitorias[vencedor.id]=0;
    const vencIdx = state.times.findIndex(t=>t.id===vencedor.id);
    if(vencIdx>=0){
      state.times.splice(vencIdx,1);
      if(state.fila.length>=6){
        const novo={id:Date.now()+1,nome:['Time A','Time B','Time C','Time D'][Math.floor(Math.random()*4)],cor:['t-A','t-B','t-C','t-D'][Math.floor(Math.random()*4)],jogadores:state.fila.splice(0,6),vitorias:0};
        state.times.push(novo);
        state.vitorias[novo.id]=0;
      }
    }
    state.fila.push(...jogVencedor);
  } else {
    showToast(`✅ ${vencedor.nome} venceu! ${perdedor.nome} saiu.`);
  }

  saveState();
  renderPanel('rodizio');
}

      <div class="confirm-btns">
        <button class="conf-btn conf-btn-sim ${conf==='sim'?'ativo':''}" onclick="membroConfirmar('sim')">✓ Vou!</button>
        <button class="conf-btn conf-btn-nao ${conf==='nao'?'ativo':''}" onclick="membroConfirmar('nao')">✗ Não vou</button>
      </div>
      ${conf?`<div style="font-size:0.8rem;color:var(--muted);margin-top:8px;text-align:center">✅ Resposta registrada!</div>`:''}
    </div>`:`
    <div class="card" style="text-align:center">
      <div style="color:var(--muted);font-size:0.85rem">Nenhuma rodada aberta no momento</div>
    </div>`}

    <div class="card">
      <div class="card-title">🔥 CHURRASCO</div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:12px">Data: ${state.churrasco.data||'A definir'}</div>
      <div class="confirm-btns">
        <button class="conf-btn conf-btn-sim ${churrasConf?'ativo':''}" onclick="membroConfirmarChurrasco(true)" style="font-size:0.85rem;padding:12px">🔥 Vou!</button>
        <button class="conf-btn conf-btn-nao ${churrasConf===false?'ativo':''}" onclick="membroConfirmarChurrasco(false)" style="font-size:0.85rem;padding:12px">✗ Não vou</button>
      </div>
    </div>
  `;
}

function membroConfirmar(val) {
  const j = state.jogadores.find(j=>j.nome===memberName&&j.ativo);
  if(!j||!state.rodadaAtual) return;
  state.rodadaAtual.confirmacoes[j.id] = val;
  saveState();
  showToast(val==='sim'?'✅ Confirmado! Até domingo!':'👋 Ok, avisado!');
  renderPanel('membro-home');
}

function membroConfirmarChurrasco(val) {
  const j = state.jogadores.find(j=>j.nome===memberName&&j.ativo);
  if(!j) return;
  state.churrasco.confirmados[j.id] = val;
  saveState();
  showToast(val?'🔥 Churrasco confirmado!':'👋 Ok, anotado!');
  renderPanel('membro-home');
}

// ============================================================
// MEMBRO — PRESENÇA
// ============================================================
function renderMembroPresenca(el) {
  const rod = state.rodadaAtual;
  if(!rod){el.innerHTML='<div class="empty"><div class="big">📅</div>Nenhuma rodada aberta</div>';return;}
  const conf = rod.confirmacoes||{};
  const confirmados = state.jogadores.filter(j=>conf[j.id]==='sim');
  el.innerHTML = `
    <div class="metrics metrics-2">
      <div class="metric"><div class="num" style="color:var(--accent)">${confirmados.length}</div><div class="lbl">Confirmados</div></div>
      <div class="metric"><div class="num" style="color:var(--muted)">${Math.max(0,24-confirmados.length)}</div><div class="lbl">Vagas livres</div></div>
    </div>
    <div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:${Math.min(100,confirmados.length/24*100)}%"></div></div>
    <div class="divider">CONFIRMADOS (${confirmados.length})</div>
    ${confirmados.map(j=>`
      <div class="jogador-item" style="border-color:#388E3C30">
        <div class="avatar" style="background:${corAvatar(j.nivel)}">${iniciais(j.nome)}</div>
        <div class="jogador-info">
          <div class="jogador-nome">${j.nome}</div>
          <div class="jogador-meta"><span class="badge b-fixo">✓ Confirmado</span></div>
        </div>
      </div>
    `).join('')}
  `;
}

// ============================================================
// MEMBRO — CHURRASCO
// ============================================================
function renderMembroChurrasco(el) {
  const ch = state.churrasco;
  const jogs = state.jogadores.filter(j=>j.ativo&&ch.confirmados?.[j.id]);
  el.innerHTML = `
    <div class="confirm-card">
      <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;margin-bottom:4px">Churrasco</div>
      <div class="big-num">${jogs.length}</div>
      <div style="font-size:0.82rem;color:var(--muted)">confirmados · ${ch.data||'Data a definir'}</div>
    </div>
    <div class="divider">QUEM VAI (${jogs.length})</div>
    ${jogs.map(j=>`
      <div class="jogador-item" style="border-color:#E6510030">
        <div class="avatar" style="background:#BF360C">${iniciais(j.nome)}</div>
        <div class="jogador-info">
          <div class="jogador-nome">${j.nome}</div>
          <div class="jogador-meta"><span style="color:var(--laranja2);font-size:0.7rem">🔥 Confirmado</span></div>
        </div>
      </div>
    `).join('')}
  `;
}

// ============================================================
// MEMBRO — TIMES
// ============================================================
function renderMembroTimes(el) {
  if(!state.times.length){el.innerHTML='<div class="empty"><div class="big">🏐</div>Times ainda não sorteados</div>';return;}
  el.innerHTML = `
    <div class="divider">TIMES DO DIA</div>
    ${state.times.map(t=>`
      <div class="time-card">
        <div class="time-header ${t.cor}" style="color:#fff">🏐 ${t.nome}</div>
        <div class="time-body">
          ${t.jogadores.map(j=>`<div class="time-player"><div class="nlvl nlvl-${j.nivel}"></div><span>${j.nome}</span></div>`).join('')}
        </div>
      </div>
    `).join('')}
    ${state.fila.length?`
      <div class="divider">FILA DE ESPERA</div>
      ${state.fila.map((j,i)=>`<div class="fila-item"><div class="fila-pos">${i+1}</div><div class="nlvl nlvl-${j.nivel}"></div><span>${j.nome}</span></div>`).join('')}
    `:''}
  `;
}

// ============================================================
// CALENDÁRIO
// ============================================================
function renderCalendario(el) {
  const proxDomingos = [];
  const hoje = new Date();
  let d = new Date(hoje);
  // Encontra próximo domingo
  while(d.getDay() !== 0) d.setDate(d.getDate()+1);
  for(let i=0;i<8;i++) {
    const dd = new Date(d);
    dd.setDate(d.getDate() + i*7);
    const isUltimo = isUltimoDomingo(dd);
    proxDomingos.push({data:dd, isUltimo});
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-title">📅 PRÓXIMOS DOMINGOS</div>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:12px">Eventos já criados no Google Calendar ✅</div>
      ${proxDomingos.map(({data,isUltimo})=>{
        const dataFmt = data.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'});
        const dataStr = data.toLocaleDateString('pt-BR');
        return `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
            <div style="text-align:center;min-width:40px">
              <div style="font-family:'Bebas Neue';font-size:1.4rem;color:var(--accent);line-height:1">${data.getDate()}</div>
              <div style="font-size:0.65rem;color:var(--muted)">${data.toLocaleDateString('pt-BR',{month:'short'}).toUpperCase()}</div>
            </div>
            <div style="flex:1">
              <div style="font-size:0.88rem;font-weight:500">🏐 Vôlei de Domingo</div>
              <div style="font-size:0.72rem;color:var(--muted)">17h às 19h${isUltimo?' · 🔥 Churrasco após o jogo':''}</div>
            </div>
            <span style="font-size:0.7rem;background:${isUltimo?'#E6510030':'#1B5E2030'};color:${isUltimo?'#FFB74D':'#81C784'};padding:3px 8px;border-radius:10px">${isUltimo?'🔥 Churras':'🏐 Jogo'}</span>
          </div>
        `;
      }).join('')}
    </div>

    <div class="card">
      <div class="card-title">ℹ️ GOOGLE CALENDAR</div>
      <div style="font-size:0.82rem;color:var(--muted);line-height:1.7">
        <div style="margin-bottom:8px">✅ Evento <b style="color:var(--text)">🏐 Vôlei de Domingo</b> criado — recorrente todo domingo 17h–19h</div>
        <div style="margin-bottom:8px">✅ Evento <b style="color:var(--text)">🔥 Churrasco do Vôlei</b> criado — 27/04 17h–21h</div>
        <div style="margin-bottom:12px">📱 Lembretes automáticos: 24h antes e 2h antes</div>
        <div style="font-size:0.75rem;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px;">
          💡 Para adicionar ao calendário da Rebecca: compartilhe os eventos com o email dela pelo Google Calendar.
        </div>
      </div>
    </div>
  `;
}

function isUltimoDomingo(data) {
  const proxSemana = new Date(data);
  proxSemana.setDate(data.getDate()+7);
  return proxSemana.getMonth() !== data.getMonth();
}

// ============================================================
// CONFIG
// ============================================================
function renderConfig(el) {
  el.innerHTML = `
    <div class="card">
      <div class="card-title">🔐 ALTERAR SENHA</div>
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:14px">Altere a senha de cada administrador separadamente.</div>
      ${ADMINS.map((a,i)=>`
        <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
          <div style="font-size:0.85rem;font-weight:500;margin-bottom:8px">👤 ${a.nome}</div>
          <input class="input" id="senha-atual-${i}" type="password" placeholder="Senha atual..." style="margin-bottom:8px"/>
          <input class="input" id="senha-nova-${i}" type="password" placeholder="Nova senha..." style="margin-bottom:8px"/>
          <input class="input" id="senha-conf-${i}" type="password" placeholder="Confirmar nova senha..."/>
          <button class="btn btn-verde btn-sm" onclick="alterarSenha(${i})">Alterar senha de ${a.nome}</button>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title">ℹ️ INFORMAÇÕES DO SISTEMA</div>
      <div class="fin-row"><span>Total de jogadores</span><span class="fin-val">${state.jogadores.filter(j=>j.ativo).length}</span></div>
      <div class="fin-row"><span>Rodadas realizadas</span><span class="fin-val">${state.rodadas.length}</span></div>
      <div class="fin-row"><span>Lançamentos no caixa</span><span class="fin-val">${state.caixa.length}</span></div>
      <div class="fin-row"><span>Versão</span><span class="fin-val" style="color:var(--muted)">v2.0</span></div>
    </div>

    <div class="card">
      <div class="card-title" style="color:var(--vermelho)">⚠️ ZONA DE PERIGO</div>
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:12px">Ações irreversíveis. Use com cuidado.</div>
      <button class="btn btn-ghost btn-block" onclick="limparLancamentosDuplicados()" style="margin-bottom:8px">🧹 Limpar lançamentos duplicados</button>
      <button class="btn btn-ghost btn-block" onclick="resetarRodada()" style="margin-bottom:8px">🔄 Resetar rodada atual</button>
      <button class="btn btn-vermelho btn-block" onclick="resetarTudo()">🗑️ Resetar todos os dados</button>
    </div>
  `;
}

function alterarSenha(idx) {
  const atual = document.getElementById(`senha-atual-${idx}`).value;
  const nova = document.getElementById(`senha-nova-${idx}`).value;
  const conf = document.getElementById(`senha-conf-${idx}`).value;

  if(atual !== ADMINS[idx].senha) { showToast('❌ Senha atual incorreta!'); return; }
  if(!nova) { showToast('Digite a nova senha!'); return; }
  if(nova !== conf) { showToast('❌ Senhas não conferem!'); return; }
  if(nova.length < 4) { showToast('Senha deve ter pelo menos 4 caracteres!'); return; }

  ADMINS[idx].senha = nova;
  saveAdmins();
  showToast(`✅ Senha de ${ADMINS[idx].nome} alterada!`);
  renderPanel('config');
}

function limparLancamentosDuplicados() {
  // Remove todas as entradas automáticas (mensalidades geradas pelo botão pagar)
  const antes = state.caixa.length;
  state.caixa = state.caixa.filter(c => !c.jogadorId && c.auto !== true);
  const depois = state.caixa.length;
  saveState();
  showToast(`🧹 ${antes - depois} lançamentos duplicados removidos!`);
  renderPanel('config');
}

function resetarRodada() {
  openModal(`
    <div class="modal-title">⚠️ RESETAR RODADA <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:0.9rem;margin-bottom:20px;color:var(--muted)">Isso vai fechar a rodada atual e resetar os times e histórico.</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-laranja" style="flex:1" onclick="confirmarResetRodada()">Resetar</button>
      </div>
    </div>
  `);
}

function confirmarResetRodada() {
  state.rodadaAtual = null;
  state.times = [];
  state.fila = [];
  state.historico = [];
  state.vitorias = {};
  saveState();
  closeModal();
  showToast('🔄 Rodada resetada!');
  renderPanel('config');
}

function resetarTudo() {
  openModal(`
    <div class="modal-title" style="color:var(--vermelho)">🗑️ RESETAR TUDO <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:2rem;margin-bottom:8px">⚠️</div>
      <div style="font-size:0.9rem;margin-bottom:6px;font-weight:500">Tem certeza absoluta?</div>
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:20px">Todos os dados serão apagados permanentemente. Os jogadores voltarão para a lista padrão.</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-vermelho" style="flex:1" onclick="confirmarResetTudo()">Sim, apagar tudo</button>
      </div>
    </div>
  `);
}

function confirmarResetTudo() {
  localStorage.removeItem('vb_state_v2');
  state = defaultState();
  saveState();
  closeModal();
  showToast('🗑️ Dados resetados!');
  renderPanel('dashboard');
}
</script>
</body>
</html>
